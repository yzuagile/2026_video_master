name: Build and Publish WPF App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore framework/framework.sln

    - name: Run tests
      run: dotnet test framework/VideoMaster.Tests/VideoMaster.Tests.csproj -c Release --no-restore

    - name: Build app
      run: dotnet build framework/framework/framework.csproj -c Release --no-restore

    - name: Publish self-contained executable
      run: dotnet publish framework/framework/framework.csproj -c Release --self-contained --runtime win-x64 -o publish

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: WPF-App-Executable
        path: publish/